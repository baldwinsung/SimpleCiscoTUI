# SimpleCiscoTUI configuration — copy to `config.toml` and edit.
#
# The app looks for, in order:
#   1. $SIMPLECISCOTUI_CONFIG
#   2. ./config.toml                              (next to where you run it)
#   3. ~/.config/simpleciscotui/config.toml
#
# With a single device configured, the app connects to it automatically on
# launch. With several, you get a picker on the connect screen.

# Optional defaults applied to every device below.
[defaults]
# username = "admin"        # omit → defaults to your local login (like `ssh host`)
# port = 22
# device_type = "cisco_ios"

# Smallest possible entry: just a host. With no password set, the app
# authenticates exactly like `ssh 192.168.1.2` — your SSH agent and ~/.ssh keys.
[[devices]]
host = "192.168.1.2"
# name = "SW1"              # label in the picker (defaults to the host)
# username = "admin"
# password = "..."         # omit to use SSH key / agent auth
# secret = "..."           # enable secret, if your login isn't already priv-15
# key_file = "~/.ssh/id_rsa"   # only if you need a specific (non-default) key

# [[devices]]
# host = "192.168.1.3"
# name = "SW2"
